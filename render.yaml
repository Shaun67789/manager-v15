services:
  - type: web
    name: groupbot-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: BOT_TOKEN
        sync: false          # Set manually in Render dashboard (secret)
      - key: OWNER_USERNAME
        sync: false          # Set manually in Render dashboard
      - key: SUPPORT_CHANNEL
        sync: false          # Optional: your support channel username (no @)
      - key: DATABASE_URL
        sync: false          # Supabase URI (URI tab in Project Settings > Database)
      - key: SUPABASE_URL
        sync: false          # Supabase Project URL (Project Settings > API)
      - key: SUPABASE_KEY
        sync: false          # Supabase Anon Key (Project Settings > API)
      - key: BOT_AUTOSTART
        value: "true"        # Auto-start bot on deploy
